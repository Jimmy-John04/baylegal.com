name: Deploy to WP Engine

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.WPENGINE_SSH_KEY }}" > ~/.ssh/wpengine_key
          chmod 600 ~/.ssh/wpengine_key
          ssh-keyscan -p 22 git.wpengine.com >> ~/.ssh/known_hosts
          cat >> ~/.ssh/config <<EOF
          Host git.wpengine.com
            IdentityFile ~/.ssh/wpengine_key
            StrictHostKeyChecking no
          EOF

      - name: Deploy to WP Engine
        run: |
          git remote add wpengine git@git.wpengine.com:baylegal.git || true
          git push wpengine main --force
